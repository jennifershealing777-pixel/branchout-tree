<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Out Tree</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>My Tree</h1>
    <p class="subtitle">Different branches, shared roots.</p>

    <div class="tree-wrap">
  <div class="tree-area">
  <img src="tree.png" alt="Tree" class="tree-image" />

  <button class="node roots" id="rootsBtn">Roots</button>
  <button class="node trunk active" id="trunkBtn">Trunk</button>
  <button class="node branches" id="branchesBtn">Branches</button>
  <button class="node leaves" id="leavesBtn">Leaves</button>
  <button class="node growth" id="growthBtn">New Growth</button>
</div>
    </div>

    <div class="panel">
      <h2 id="panelTitle">Trunk</h2>
      <div id="panelContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
